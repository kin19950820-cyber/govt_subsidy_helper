name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build benefits content
        run: npm run benefits:build
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Unit tests (Vitest)
        run: npm run test:run
      - name: Next build
        run: npm run build

  # Official-link check is network-dependent (government sites, some CDN-gated).
  # Kept as a separate, non-blocking job so link rot is surfaced without failing
  # every PR on a transient timeout.
  link-check:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/check-links.mjs
